<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Translator Options</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 24px auto; max-width: 760px; padding: 0 16px; }
      h1 { margin-bottom: 16px; }
      form { display: grid; gap: 12px; }
      label { display: grid; gap: 6px; font-size: 14px; }
      input, select { padding: 8px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 14px; }
      button { width: fit-content; padding: 10px 14px; border: 1px solid #d0d7de; border-radius: 8px; background: white; cursor: pointer; }
      button.primary { background: #0969da; border-color: #0969da; color: white; }
      .row { display: flex; gap: 10px; align-items: center; }
      .hint { color: #57606a; font-size: 13px; }
      .status { min-height: 20px; font-size: 13px; color: #0969da; }
      code { background: #f6f8fa; padding: 2px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>LLM Translator 설정</h1>
    <p class="hint">OAuth 우선 구조를 제공하며, MVP는 API Key 기반 OpenAI Provider를 기본 지원합니다.</p>

    <form id="settingsForm">
      <label>
        Provider
        <select id="providerId">
          <option value="openai">OpenAI</option>
          <option value="custom">Custom</option>
        </select>
      </label>

      <label>
        Auth Type
        <select id="authType">
          <option value="apiKey">API Key</option>
          <option value="oauth">OAuth (준비)</option>
          <option value="proxy">Proxy</option>
        </select>
      </label>

      <label>
        API Key
        <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
      </label>

      <label>
        Model
        <input id="model" type="text" placeholder="gpt-4o-mini" />
      </label>

      <label>
        Endpoint
        <input id="endpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" />
      </label>

      <label>
        Proxy URL (선택)
        <input id="proxyUrl" type="url" placeholder="https://your-proxy.workers.dev/translate" />
      </label>

      <label>
        기본 모드
        <select id="mode">
          <option value="reader">Reader (재렌더링)</option>
          <option value="inline">Inline (원페이지 삽입)</option>
        </select>
      </label>

      <label>
        Chunk Size (문단 수)
        <input id="chunkSize" type="number" min="2" max="20" step="1" />
      </label>

      <div class="row">
        <button id="save" class="primary" type="submit">저장</button>
        <button id="clearCache" type="button">캐시 삭제</button>
      </div>

      <p class="hint">테스트 실행 전 <code>API Key</code>와 <code>Model</code>을 먼저 저장하세요.</p>
      <div id="status" class="status"></div>
    </form>

    <script type="module" src="./options.js"></script>
  </body>
</html>
