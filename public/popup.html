<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Translator</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 12px; width: 280px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; gap: 8px; margin-bottom: 8px; }
      button { flex: 1; padding: 8px; border: 1px solid #d0d7de; border-radius: 8px; background: white; cursor: pointer; }
      button.primary { background: #0969da; color: white; border-color: #0969da; }
      .status { font-size: 12px; color: #57606a; min-height: 16px; }
      a { font-size: 12px; color: #0969da; }
    </style>
  </head>
  <body>
    <h1>LLM Translator</h1>
    <div class="row">
      <button id="start" class="primary">이 페이지 번역</button>
      <button id="stop">끄기</button>
    </div>
    <div id="status" class="status"></div>
    <a id="openOptions" href="#">설정 열기</a>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
